# Production deploy — forces a Vercel production deploy on every push to main.
#
# WHY THIS EXISTS: Vercel's own Git integration silently stopped promoting main
# to production after 2026-07-01 (it kept building branch PREVIEWS, but the last
# merges to main never became production — gotvero.com sat on an old build). This
# workflow guarantees main -> production regardless of what the Vercel dashboard
# decides to do, by hitting a Deploy Hook (a Vercel URL that triggers a
# production build of the main branch).
#
# SETUP (one time, ~60 seconds):
#   1. Vercel -> project "vero" -> Settings -> Git -> Deploy Hooks.
#      Create hook: name "deploy-main", branch "main". Copy the URL it gives you.
#   2. GitHub repo -> Settings -> Secrets and variables -> Actions ->
#      New repository secret -> name VERCEL_DEPLOY_HOOK, paste the URL, save.
#
# After that, every merge to main fires the hook and gotvero.com updates on its
# own. A single curl — no token, no project linking, nothing that can drift.
name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets a "deploy now" be triggered manually / via API
concurrency:
  group: production-deploy
  cancel-in-progress: false   # let an in-flight deploy finish; queue the next
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fire the Vercel production deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK secret is not set. Create a Deploy Hook in Vercel (Settings -> Git -> Deploy Hooks, branch main) and add its URL as a repo secret named VERCEL_DEPLOY_HOOK."
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" -o /dev/null -w "Vercel deploy hook fired: HTTP %{http_code}\n"
      # Confirm gotvero.com is ACTUALLY serving this commit — not just that the hook was accepted.
      # /api/version reports the build's VERCEL_GIT_COMMIT_SHA (no-store). Poll until it matches
      # this workflow's commit, or fail loudly so a stuck/failed production build can't look "shipped".
      - name: Verify gotvero.com is serving this commit
        run: |
          SHA="${{ github.sha }}"
          echo "Waiting for https://gotvero.com/api/version to report $SHA …"
          for i in $(seq 1 24); do
            LIVE=$(curl -fsS --max-time 15 "https://gotvero.com/api/version" 2>/dev/null | sed -n 's/.*"sha":"\{0,1\}\([0-9a-f]\{7,40\}\)"\{0,1\}.*/\1/p' || true)
            if [ "$LIVE" = "$SHA" ]; then echo "✅ gotvero.com is live on $SHA (attempt $i)"; exit 0; fi
            echo "attempt $i/24: live=${LIVE:-<none>} — not yet, waiting 15s"
            sleep 15
          done
          echo "::error::gotvero.com did not report commit $SHA within ~6 minutes — the production build may have failed to go live. Check Vercel → vero → Deployments."
          exit 1
