# Vero uptime watchdog — Stage 2 of the outage-resilience work.
#
# Runs on GitHub's infrastructure (OUTSIDE the app, so it survives the app's own
# outage) every 5 minutes. It checks the website AND the database directly — the
# site returns 200 even when the database is down, which is exactly the failure a
# plain ping would miss (2026-07-08).
#
# On a NEW outage it emails the owner with a clean "Vero is DOWN" alert through
# the app's own messaging system (/api/notify, email only — no text). It
# alerts ONCE per outage (reads this workflow's own run history), so a long
# outage doesn't text every 5 minutes. See scripts/uptime-watch.py for the logic.
#
# The run also exits non-zero when down, so GitHub logs it and its built-in
# failure email fires as a BACKUP — critical because if the whole SITE is down,
# the /api/notify alert can't send (same host) and GitHub email is all that's left.
name: Vero is DOWN (uptime alarm)

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub may delay under load)
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Type 'yes' to send yourself a TEST downtime alert (email only). Nothing is wrong."
        required: false
        default: "no"

# Serialize runs so 'previous run conclusion' (the de-dupe signal) is never racy.
concurrency:
  group: uptime-check
  cancel-in-progress: false

# Least privilege: the watchdog only needs to READ its own run history for de-dupe.
permissions:
  actions: read
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the watchdog script
        uses: actions/checkout@v4

      - name: Check site + database + sign-in, email once on a new outage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_ALERT: ${{ github.event.inputs.test_alert }}
        run: python3 scripts/uptime-watch.py
