# Vero uptime watchdog — Stage 2 of the outage-resilience work.
#
# WHY THIS LIVES ON GITHUB, NOT IN THE APP: an alarm has to run OUTSIDE the thing
# it watches, or it dies in the same outage. This runs on GitHub's infrastructure
# and checks Vero from the outside every 5 minutes:
#   1. the website  (gotvero.com)
#   2. the database (Supabase) — the exact thing that went dark on 2026-07-08; a
#      plain site ping wouldn't catch it because the site returns 200 even when
#      the database is down, so we hit the DB directly.
# If either is DOWN, the step fails → the workflow fails → GitHub emails the repo
# owner automatically (no app code, no third-party account, no secrets). Because
# the alert path is GitHub's own email, it still fires even if BOTH the site and
# the database are down at once — no blind spot.
#
# EMAIL ONLY (by choice): alerts go to the GitHub-account email of the repo owner.
# Make sure GitHub → Settings → Notifications → "Actions" email is ON (it is by
# default). Texts are intentionally not wired here; add SMS later once the Vonage
# number is verified.
#
# The public anon key in the DB URL below is the same one shipped in the app
# bundle — it is safe to commit. It grants no more than any visitor already has.
#
# NOTE: scheduled workflows run from the DEFAULT branch and can be delayed by
# GitHub under load; ~5-minute checks are best-effort, which is fine for uptime.
name: uptime-check

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub may delay under load)
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Type 'yes' to force a DELIBERATE test failure — use once to confirm the down-alert email reaches you. Nothing is actually wrong."
        required: false
        default: "no"

# One run at a time; don't pile up if a check is slow or GitHub bunches schedules.
concurrency:
  group: uptime-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the probe script
        uses: actions/checkout@v4

      - name: Test alert (manual only — proves the email reaches you)
        if: ${{ github.event.inputs.test_alert == 'yes' }}
        run: |
          echo "::error::TEST ALERT — this is a deliberate failure to confirm Vero downtime emails reach you. Nothing is actually wrong; ignore this one."
          exit 1

      - name: Website (gotvero.com) is reachable
        run: bash scripts/uptime-probe.sh "https://gotvero.com" "200" "Vero website (gotvero.com)"

      - name: Database (Supabase) is reachable
        run: bash scripts/uptime-probe.sh "https://iufgznminbujcabqeesk.supabase.co/rest/v1/services?select=id&limit=1&shop_id=eq.sanctuary&apikey=sb_publishable_aGX3akW7VfHO6Lm-FsZmEA_sf95Nu2i" "200" "Vero database (Supabase)"
