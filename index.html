<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Vero</title>
    <style>
      /* Instant boot screen (app-boot-splash): painted the moment the page loads, so the ~1-2s while
         the app's JS parses is a calm branded screen instead of a blank white stare. It lives inside
         #root, so React clears it automatically the instant the app mounts — no JS needed to remove it. */
      #boot { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; background: #F6F3EC; color: #1A1712; -webkit-font-smoothing: antialiased; }
      #boot .wm { font-family: Georgia, 'Times New Roman', serif; font-size: 40px; font-weight: 500; letter-spacing: 0.5px; opacity: 0.92; }
      #boot .sp { width: 26px; height: 26px; border: 2.5px solid rgba(26,23,18,0.16); border-top-color: rgba(26,23,18,0.7); border-radius: 50%; animation: bootspin 0.8s linear infinite; }
      @keyframes bootspin { to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: dark) { #boot { background: #14110E; color: #F2EBDD; } #boot .sp { border-color: rgba(242,235,221,0.18); border-top-color: rgba(242,235,221,0.72); } }
    </style>
  </head>
  <body>
    <div id="root"><div id="boot"><div class="wm">Vero</div><div class="sp"></div></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
