<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- GUARD: native-viewport-boot — capacitor:// must set viewport from screen.width BEFORE
         paint. device-width / innerWidth often resolve wrong (~980) and the whole UI looks zoomed. -->
    <script>
      (function () {
        var proto = window.location.protocol;
        var isCapBundle = proto === 'capacitor:' || proto === 'ionic:';
        var m = document.createElement('meta');
        m.name = 'viewport';
        if (isCapBundle) {
          var sw = Math.min(screen.width || 390, screen.height || 844);
          m.content = 'width=' + sw + ', initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover';
        } else {
          m.content = 'viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no';
        }
        document.head.appendChild(m);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Vero</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
